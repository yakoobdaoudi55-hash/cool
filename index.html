<!DOCTYPE html>
<html lang="en">
<head>
  
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Very Important Question</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

<style>
  @keyframes fall {
    0% {
        transform: translateY(0);
        opacity: 1;
    }
    100% {
        transform: translateY(110vh);
        opacity: 0;
    }
}
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#10182a,#1f2d4d);
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:15px;
}

.container{
    width:100%;
    max-width:420px;
    padding:20px;
}

h1{
    font-family:'Playfair Display',serif;
    font-size:clamp(1.6rem,6vw,2.4rem);
    margin-bottom:12px;
}

.subtitle{
    font-size:clamp(0.95rem,4vw,1.1rem);
    line-height:1.5;
    margin-bottom:18px;
    opacity:0.9;
}

img{
    width:100%;
    max-width:260px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.buttons{
    margin-top:20px;
    display:flex;
    justify-content:center;
    gap:12px;
    flex-wrap:wrap;
}

button{
    border:none;
    cursor:pointer;
    padding:12px 20px;
    min-width:120px;
    font-size:1rem;
    border-radius:12px;
    transition:0.3s;
    font-weight:600;
}

#yesBtn{
    background:white;
    color:#ff4b5c;
}

#noBtn{
    background:#ff4b5c;
    color:white;
}

@media (max-width:500px){
    button{
        width:100%;
    }
}
</style>

</head>

<body>

<div class="container">

<h1>I have a question...</h1>

<p class="subtitle">
Would you make my days a little better and be my girlfriend?
</p>

<img src="37.jpg" alt="Cute Cat">

<div class="buttons">
    <button id="yesBtn">Yes ❤️</button>
    <button id="noBtn">No 😌</button>
</div>

</div>

<script>

const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const catImg = document.querySelector("img");

const images = [
    "37.jpg",
    "38.jpg",
    "39.jpg",
    "40.jpg",
    "tb.jpg",
    "41.jpg",
];

const messages = [
    "No 😌",
    "Are you sure?",
    "Really? achfay 3liha",
    "Think again",
    "Last chance 🔪",
    "Fine..."
];

let clickCount = 0;
/* 🔊 YES SOUND */
const yesSound = new Audio("back.mp3");
yesSound.preload = "auto";

/* 🔊 NO SOUND */
const noSound = new Audio("cool.mp3");
noSound.preload = "auto";

/* hearts */
const heartInterval = setInterval(() => {

    const heart = document.createElement("div");
    heart.innerHTML = "❤️";
    heart.style.position = "fixed";
    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.top = "-20px";
    heart.style.fontSize = (18 + Math.random() * 18) + "px";
    heart.style.animation = "fall 4s linear forwards";
    heart.style.pointerEvents = "none";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);

}, 700);

/* NO */
noBtn.addEventListener("click", () => {

    noSound.currentTime = 0;
    noSound.play().catch(() => {});

    clickCount++;

    yesBtn.style.transform = `scale(${Math.min(1 + clickCount * 0.15, 1.8)})`;

    if(clickCount < messages.length){
        noBtn.textContent = messages[clickCount];
    }

    const imgIndex = Math.min(clickCount, images.length - 1);
    catImg.src = images[imgIndex];
});

/* YES */
yesBtn.addEventListener("click", () => {

    /* 🔥 FIX: STOP SOUND */
    noSound.pause();
    noSound.currentTime = 0;
  yesSound.pause();
yesSound.currentTime = 0;
yesSound.play().catch(() => {});

    clearInterval(heartInterval);

    document.body.innerHTML = `
        <div style="
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            text-align:center;
            padding:20px;
            color:white;
            background:linear-gradient(135deg,#10182a,#1f2d4d);
            font-family:'Poppins',sans-serif;
        ">

            <h1 style="font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,6vw,3rem);">
    𝙎𝙝𝙚 𝙨𝙖𝙞𝙙 𝙔𝙀𝙎❤️
</h1>

            <p style="font-family:'Audiowide', sans-serif;font-size:1.2rem;margin:10px 0;">
                𝔐𝔦𝔰𝔰𝔦𝔬𝔫 𝔞𝔠𝔠𝔬𝔪𝔭𝔩𝔦𝔰𝔥𝔢𝔡.
            </p>

            <video autoplay muted loop playsinline
                style="
                    width:90%;
                    max-width:280px;
                    border-radius:20px;
                    box-shadow:0 10px 30px rgba(0,0,0,.3);
                ">
                <source src="yes.mp4" type="video/mp4">
            </video>

            <h1 style="opacity:0.9;margin-top:15px;">
                𝙡𝙤𝙫𝙚 𝙮𝙤𝙪...
            </h1>

        
        </div>
    `;
});

</script>

</body>
</html>
