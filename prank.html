<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>?</title>
<style>
  body {
    font-family: 'Poppins', sans-serif;
    background-color: #10182a;
    color: #ffffff;
    text-align: center;
    height: 100vh;
    margin: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  h1 {
    font-size: 2em;
    margin-bottom: 20px;
  }

  .buttons {
    margin-top: 20px;
  }

  button {
    background-color: white;
    color: #ff4b5c;
    border: none;
    padding: 12px 29px;
    margin: 10px;
    font-size: 1.2em;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.2s ease, background-color 0.3s;
  }

  button:hover {
    transform: scale(1.1);
  }

  img {
    width: 220px;
    border-radius: 15px;
    margin-top: 20px;
    display: block;
  }
</style>
</head>
<body>

<h1>do u wanna be my girlfriend date? </h1>

<img src="35.jpg" alt="Happy Cat">
    
<div class="buttons">
  <button id="yesBtn">nah icant</button>
  <button id="noBtn">yes  ❤️</button>
</div>

<script>
  const noBtn = document.getElementById('noBtn');
  const yesBtn = document.getElementById('yesBtn');

  // عند الضغط على "na7reg ❤️" يكبر الزر الآخر
  let scale = 1;
  noBtn.addEventListener('click', () => {
    scale += 0.2;
    yesBtn.style.transform = `scale(${scale})`;
  });

  // عند الضغط على الزر الآخر تظهر الرسالة
  yesBtn.addEventListener('click', () => {
    document.body.innerHTML = `
      <h1>تحيا الجزائر 🇩🇿🔥</h1>
      <img src="tb.jpg" alt="Happy Cat">
    `;
    const audio = new Audio('تحيا.mp3');
    audio.play();
  });
</script>

</body>
</html>
